<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>Tigo Ponce de León</title>
  
  <link rel="icon" type="image/png" href="Media/blackcircle.png" />
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div id="intro" class="intro-screen">
    <div class="intro-text" id="introText"></div>
  </div>

  <nav class="centered-nav">
    <a href="index.html" class="nav-link name">Tigo Ponce de León</a>
    <a href="work.html" class="nav-link">work</a>

  <div class="circle-container">
    <img src="Media/web_photo.png" alt="Portrait of Tigo" class="center-image" />
    <svg viewBox="0 0 200 200" class="circle-text">
      <defs>
        <path
          id="circlePath"
          d="M100,100 m-90,0 a90,90 0 1,1 180,0 a90,90 0 1,1 -180,0"
        />
      </defs>
      <g class="rotate">
        <text id="circleText">
          <textPath href="#circlePath" startOffset="0" id="circlePathText">
            university of chicago · html/css/js · digital product designer · figma · ux research · ai ·
          </textPath>
        </text>
      </g>
    </svg>
  </div>

  <div class="bottom-bar">
    <div id="chicagoClock">Chicago — 00:00 CT</div>
    <button class="theme-toggle" aria-label="Toggle Dark Mode" aria-pressed="false">
      <span class="icon">
        <img src="media/moon.png" alt="moon" />

    </button>
  </div>

  <script src="index.js"></script>
